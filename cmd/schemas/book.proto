syntax = "proto3";

package schema;

option go_package = "github.com/alcb1310/proto-server/cmd/schemas";

message Book {
  uint32 id = 1;
  string title = 2;
  repeated Author authors = 3;
  Publisher publisher = 4;
}

message Books {
  repeated Book books = 1;
}

message Author {
  uint32 id = 1;
  string name = 2;
}

message Authors {
  repeated Author authors = 1;
}

message Publisher {
  uint32 id = 1;
  string name = 2;
}

enum Genre {
  ACTION = 0;
  DRAMA = 1;
  ROMANCE = 2;
  THRILLER = 3;
  COMEDY = 4;
  FANTASY = 5;
  SCIFI = 6;
  HORROR = 7;
  MYSTERY = 8;
  TECHNICAL = 9;
}
